name: Build Anland v4 Android Consumer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install SDK Command-Line Tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-13250338_latest.zip \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mv /tmp/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm -rf /tmp/cmdline-tools.zip
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

      - name: Install NDK and SDK components
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          sdkmanager "ndk;29.0.13113456" "platforms;android-36"

      - name: Build debug APK
        working-directory: consumers/anland_v4/android_consumer
        run: |
          chmod +x gradlew
          export JAVA_HOME=$(dirname $(dirname $(which java)))
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: anland-v4-consumer
          path: |
            consumers/anland_v4/android_consumer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
concurrency: 
