name: Build Anland Virtual Keyboard V4

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 1: 编译 display_daemon (C++ 守护进程)
  # ============================================================
  build-daemon:
    name: Build Display Daemon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          local-cache: true

      - name: Build display_daemon
        env:
          NDK_DIR: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x build_daemon_android.sh
          bash build_daemon_android.sh

      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: display_daemon
          path: build_daemon_android/display_daemon
          retention-days: 7

  # ============================================================
  # Job 2: 编译 Android App (虚拟键盘 v4)
  # ============================================================
  build-app:
    name: Build Android App (Virtual Keyboard V4)
    runs-on: ubuntu-latest
    needs: build-daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Decode app/build.gradle
        run: |
          # 确认构建配置
          cat consumers/anland_virtual_keyboard_v4/android_consumer/app/build.gradle

      - name: Build APK (Debug)
        working-directory: consumers/anland_virtual_keyboard_v4/android_consumer
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build APK (Release)
        working-directory: consumers/anland_virtual_keyboard_v4/android_consumer
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anland-v4-apks
          path: |
            consumers/anland_virtual_keyboard_v4/android_consumer/app/build/outputs/apk/debug/app-debug.apk
            consumers/anland_virtual_keyboard_v4/android_consumer/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

  # ============================================================
  # Job 3: 打包 Magisk 模块 (可选)
  # ============================================================
  build-magisk:
    name: Build Magisk Module
    runs-on: ubuntu-latest
    needs: build-daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          local-cache: true

      - name: Build Magisk module
        env:
          NDK_DIR: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x build_magisk_module.sh
          bash build_magisk_module.sh

      - name: Upload Magisk zip
        uses: actions/upload-artifact@v4
        with:
          name: anland-magisk-module
          path: anland-daemon.zip
          retention-days: 7
