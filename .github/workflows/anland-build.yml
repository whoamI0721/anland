name: Build Anland Virtual Keyboard V4 App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-app:
    name: Build Android App (Virtual Keyboard V4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Build APK (Debug)
        working-directory: consumers/anland_virtual_keyboard_v4/android_consumer
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build APK (Release)
        working-directory: consumers/anland_virtual_keyboard_v4/android_consumer
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anland-v4-apks
          path: |
            consumers/anland_virtual_keyboard_v4/android_consumer/app/build/outputs/apk/debug/app-debug.apk
            consumers/anland_virtual_keyboard_v4/android_consumer/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
